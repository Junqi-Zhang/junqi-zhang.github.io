name: Get Citation Data

"on":
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

concurrency:
  group: google-scholar-stats
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: google_scholar_crawler/requirements.txt
      - name: Install Reqs
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r google_scholar_crawler/requirements.txt
      - name: Run crawler
        run: python google_scholar_crawler/main.py
        env:
          GOOGLE_SCHOLAR_ID: ${{ secrets.GOOGLE_SCHOLAR_ID }}
      - name: Push citation data
        run: |
          cd google_scholar_crawler/results
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          export remote_repo="https://x-access-token:${{ github.token }}@github.com/${GITHUB_REPOSITORY}.git"
          git add *.json
          git commit -m "Updated Citation Data"
          git push "${remote_repo}" HEAD:google-scholar-stats --force
